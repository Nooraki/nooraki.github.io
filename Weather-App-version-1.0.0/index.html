<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ربات آب و هوا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles.css">
    
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    
    <div class="wrapper">

        <h1>ربات آب و هوا در تلگرام</h1>

        <div class="tab-container">
            <p class="tab" data-userWeather>شهر شما</p>
            <p class="tab" data-searchWeather>جستوجو</p>
        </div>

        <div class="weather-container">

            <!-- grant location container-->
            <div class="sub-container grant-location-container">
                <img src="./assets/location.png" width="80" height="80" loading="lazy">
                <p>دسترسی به مکان</p>
                <p>لطفا روی جازه دادن ضربه بزنید تا شهر به صورت خودکار جستوجو شود</p>
                <button class="btn" data-grantAccess>اجازه دادن</button>
            </div>

            <!-- search form -> form-container-->
            <form class="form-container" data-searchForm>
                <input placeholder="شهر مورد نظر خود را بدون فاطله تایپ کنید" data-searchInput>
                <button class="btn" type="submit">
                    <img src="./assets/search.png"  width="20" height="20" loading="lazy">
                </button>
            </form>

            <!--- loading screen container -->
            <div class="sub-container loading-container">
                <img src="./assets/loading.gif" width="150" height="150">
                <p>در حال جستوجو</p>
            </div>

            <!-- show weather info -->
            <div class="sub-container user-info-container">

                <!--city name and Flag-->
                <div class="name">
                    <p data-cityName></p>
                    <img data-countryIcon>
                </div>
                
<!-- weather descriptuion-->
<p data-weatherDesc></p>
<!--weather Icon-->
<img data-weatherIcon>
<!--temperature-->
<p data-temp></p>

                <!--3 cards - parameters-->
                <div class="parameter-container">

                    <!--card 1-->
                    <div class="parameter">
                        <img src="./assets/wind.png" >
                        <p>سرعت باد</p>
                        <p data-windspeed></p>
                    </div>

                    <!--card 2-->
                    <div class="parameter">
                        <img src="./assets/humidity.png" >
                        <p>رطوبت</p>
                        <p data-humidity></p>
                    </div>

                    <!--card 3-->
                    <div class="parameter">
                        <img src="./assets/cloud.png" >
                        <p>میزان ابر</p>
                        <p data-cloudiness></p>
                    </div>

                </div>


            </div>



        </div>


    </div>


    <script src="script.js"></script>
</body>
</html>
