<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> وبسایت محمدرضا نورکی |  WEBSITE MOHAMMADREZA NOORAKI </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Vazir, sans-serif;
        }

        body {
            overflow: hidden;
            transition: all 1s ease-in-out;
        }

        .section {
            height: 100vh;
            width: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            transform: translateY(50px);
            opacity: 0;
            transition: all 1s ease;
            padding: 15px;
            width: 90%;
            max-width: 800px;
        }

        .content.active {
            transform: translateY(0);
            opacity: 1;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .vertical-menu {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .vertical-menu a {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .vertical-menu a i {
            color: white;
            font-size: 1rem;
            transition: inherit;
        }

        .vertical-menu a:hover {
            background: #3498db;
            transform: scale(1.2);
        }

        .vertical-menu a.active {
            background: #e74c3c;
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
        }

        .vertical-menu a::after {
            content: attr(data-title);
            position: absolute;
            right: 40px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .vertical-menu a:hover::after {
            opacity: 1;
            right: 45px;
        }

        #contact {
            background: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .vertical-menu {
                right: 15px;
                gap: 15px;
            }

            .vertical-menu a {
                width: 25px;
                height: 25px;
            }

            .vertical-menu a i {
                font-size: 0.8rem;
            }

            .content h1 {
                font-size: 1.5rem;
            }

            .content h2 {
                font-size: 1.3rem;
            }

            .content p {
                font-size: 0.9rem;
            }

            .btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }

            .vertical-menu a::after {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .vertical-menu {
                bottom: 20px;
                top: auto;
                right: 50%;
                transform: translateX(50%);
                flex-direction: row;
                gap: 10px;
                background: rgba(0,0,0,0.5);
                padding: 10px;
                border-radius: 30px;
            }

            .section {
                background-attachment: scroll;
            }

            .content {
                transform: translateY(30px);
            }

            .btn {
                margin-top: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="vertical-menu">
        <a href="#home" data-title="خانه" class="active">
            <i class="fas fa-home"></i>
        </a>
        <a href="#about" data-title="درباره ما">
            <i class="fas fa-info-circle"></i>
        </a>
        <a href="#contact" data-title="تماس">
            <i class="fas fa-phone"></i>
        </a>
    </nav>

    <section class="section" id="home" style="background-image: url('bg-home.jpg')">
        <div class="content">
            <h1>به سایت ما خوش آمدید</h1>
            <a href="#about" class="btn">شروع کنید</a>
        </div>
    </section>

    <section class="section" id="about" style="background-image: url('bg-about.jpg')">
        <div class="content">
            <h2>درباره ما</h2>
            <p>این صفحه در دست تکمیل است ...</p>
            <a href="#contact" class="btn">تماس با ما</a>
        </div>
    </section>

    <section class="section" id="content" style="background-image: url('bg-content.jpg')">
        <div class="content">
            <h2>تماس با ما</h2>
            <p>آدرس:   خراسان رضوی گناباد</p>
            <p>تلفن: 09059780482</p>
            <div style="margin-top: 2rem;">
                <a href="https://t.me/NOORAKImohammadreza" class="btn"> ارسال پیام در تلگرام</a>
            </div>
        </div>
    </section>

    <script>
        let currentSection = 0;
        const sections = document.querySelectorAll('.section');
        const contents = document.querySelectorAll('.content');
        const menuLinks = document.querySelectorAll('.vertical-menu a');
        let isScrolling = false;
        let lastScrollTime = 0;

        function changeSection(index) {
            if (isScrolling || index === currentSection) return;
            isScrolling = true;
            
            currentSection = index;
            sections.forEach((section, i) => {
                section.style.transform = `translateY(-${currentSection * 100}%)`;
                contents[i].classList.toggle('active', i === currentSection);
            });
            
            menuLinks.forEach(link => link.classList.remove('active'));
            menuLinks[currentSection].classList.add('active');

            setTimeout(() => {
                isScrolling = false;
            }, 1000);
        }

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            const now = Date.now();
            if (now - lastScrollTime < 1000) return;
            lastScrollTime = now;

            const delta = Math.sign(e.deltaY);
            if(delta > 0 && currentSection < sections.length - 1) {
                changeSection(currentSection + 1);
            } else if(delta < 0 && currentSection > 0) {
                changeSection(currentSection - 1);
            }
        });

        menuLinks.forEach((link, index) => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                changeSection(index);
            });
        });

        window.onload = () => {
            contents[0].classList.add('active');
        }
    </script>
</body>
</html>
