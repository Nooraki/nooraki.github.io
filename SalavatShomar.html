<!DOCTYPE HTML>
<html lang="fa" dir="rtl">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover">
<title>MohammadReza Nooraki| محمدرضا نورکی صلوات شمار</title>
<link rel="stylesheet" type="text/css" href="styles/bootstrap.rtl.min.css">
<link rel="stylesheet" type="text/css" href="styles/style.css">
<link rel="stylesheet" type="text/css" href="fonts/css/all.min.css">    
<link rel="apple-touch-icon" sizes="180x180" href="app/icons/Logo-PNG.png">
</head>
<body>
   <div style="margin: auto; margin-top: 50%;">
    <div class="container ">
        <h1 style="text-align: center;" >صلوات شمار</h1>
        <p style="text-align: center;"> تعداد صلوات : <span id="clickCount">0</span></p>
        <button class="btn btn-m btn-full mb-3 rounded-xs font-700 shadow-s bg-green-light" id="clickButton" style="margin: auto;">اللهم صل علی محمد و آل محمد و عجل فرجهم</button>
<button class="btn btn-m btn-full mb-3 rounded-xs font-700 shadow-s bg-red-light" id="resetButton" style="margin: auto;">ریست</button>  

    </div>
</div>
 <script>
   // بارگذاری تعداد کلیک‌ها از localStorage
let clickCount = localStorage.getItem('clickCount') || 0;
document.getElementById('clickCount').textContent = clickCount;

// تابع برای افزایش شمارش کلیک
function incrementCounter() {
    clickCount++;
    document.getElementById('clickCount').textContent = clickCount;
    localStorage.setItem('clickCount', clickCount); // ذخیره‌سازی در localStorage
}

// تابع برای ریست کردن شمارشگر
function resetCounter() {
    clickCount = 0;
    document.getElementById('clickCount').textContent = clickCount;
    localStorage.removeItem('clickCount'); // حذف مقدار از localStorage
}

// اضافه کردن رویداد کلیک به دکمه‌ها
document.getElementById('clickButton').addEventListener('click', incrementCounter);
document.getElementById('resetButton').addEventListener('click', resetCounter);
 </script>
</body>
</html>
